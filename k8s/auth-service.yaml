apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  ports:
    - port: 3001
  selector:
    app: auth-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: auth-service:latest # Ensure you build this locally or push to a registry
          imagePullPolicy: Never
          env:
            - name: PORT
              value: "3001"
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: password
            - name: DB_NAME
              value: iam_db
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
