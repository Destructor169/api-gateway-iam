apiVersion: v1
kind: Service
metadata:
  name: trading-service
spec:
  ports:
    - port: 3004
  selector:
    app: trading-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-service
spec:
  selector:
    matchLabels:
      app: trading-service
  template:
    metadata:
      labels:
        app: trading-service
    spec:
      containers:
        - name: trading-service
          image: trading-service:latest
          imagePullPolicy: Never
          env:
            - name: PORT
              value: "3004"
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: password
            - name: DB_NAME
              value: iam_db
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
