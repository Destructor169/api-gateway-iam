apiVersion: v1
kind: Service
metadata:
  name: news-service
spec:
  ports:
    - port: 3003
  selector:
    app: news-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: news-service
spec:
  selector:
    matchLabels:
      app: news-service
  template:
    metadata:
      labels:
        app: news-service
    spec:
      containers:
        - name: news-service
          image: news-service:latest
          imagePullPolicy: Never
          env:
            - name: PORT
              value: "3003"
